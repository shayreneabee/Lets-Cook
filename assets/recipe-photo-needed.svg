<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Exact recipe photo needed</title>
  <desc id="desc">A warm placeholder used when a matching dish photo has not been added yet.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="0.55" stop-color="#f1dfbd"/>
      <stop offset="1" stop-color="#d9a441"/>
    </linearGradient>
    <radialGradient id="glow" cx="25%" cy="20%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#5c3012" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <circle cx="1010" cy="140" r="210" fill="#7d9270" opacity="0.14"/>
  <circle cx="160" cy="760" r="260" fill="#b56b45" opacity="0.12"/>
  <g filter="url(#shadow)">
    <rect x="270" y="170" width="660" height="520" rx="56" fill="#fffaf3" stroke="#e1c792" stroke-width="8"/>
    <circle cx="600" cy="352" r="122" fill="#ffffff" stroke="#d9a441" stroke-width="18"/>
    <path d="M520 348c30-68 126-68 160 0 28 56-4 128-80 166-76-38-108-110-80-166z" fill="#b56b45" opacity="0.9"/>
    <path d="M502 553h196" stroke="#7d9270" stroke-width="22" stroke-linecap="round"/>
    <path d="M548 606h104" stroke="#7d9270" stroke-width="22" stroke-linecap="round" opacity="0.72"/>
  </g>
  <text x="600" y="756" text-anchor="middle" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#2b1a12">Exact Photo Needed</text>
  <text x="600" y="812" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#5f4a3f">We will not use the wrong food image.</text>
</svg>
