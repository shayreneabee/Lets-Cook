services:
  - type: web
    name: lets-cook-yall
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: INSTANCE_DIR
        value: /data/instance
      - key: DATABASE_PATH
        value: /data/instance/lets_cook.sqlite
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: BRENT_SSO_URL
        value: https://www.brentandco.org/sso/start
      - key: SSO_SHARED_SECRET
        sync: false
      - key: DEBUG_SSO
        value: "0"
    disk:
      name: lets-cook-data
      mountPath: /data
      sizeGB: 1
