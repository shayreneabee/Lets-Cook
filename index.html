<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let's Cook Ya'll</title>
    <meta name="theme-color" content="#087d15" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#lets-cook" aria-label="Let's Cook Ya'll home">
        <img src="assets/logo.png" alt="Let's Cook Ya'll" />
      </a>
      <div class="active-app-mark" aria-live="polite">
        <img src="assets/logo.png" alt="" />
        <span>Let's Cook Ya'll</span>
      </div>
      <button class="menu-toggle" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="#lets-cook" data-route="lets-cook">Home</a>
        <a href="#cook101" data-route="lets-cook">Cook 101</a>
        <a href="#recipes" data-route="lets-cook">Recipes</a>
        <a href="#paths" data-route="lets-cook">Cooking Paths</a>
        <a href="#planner" data-route="lets-cook">Meal Planner</a>
      </nav>
    </header>

    <main id="app" tabindex="-1"></main>

    <footer class="site-footer">
      <div class="socials" aria-label="Brent and Co app links">
        <a href="#lets-cook" aria-label="Let's Cook Ya'll">LC</a>
        <a href="#find-the-beat" aria-label="Find the Beat">FTB</a>
        <a href="#beu" aria-label="BEU">BEU</a>
        <a href="#second-chance" aria-label="Second Chance Careers">SC</a>
      </div>
      <a class="home-fab" href="#lets-cook" aria-label="Back to Let's Cook home">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 11.5 12 4l9 7.5v8a1 1 0 0 1-1 1h-5.5v-6h-5v6H4a1 1 0 0 1-1-1z" />
        </svg>
      </a>
    </footer>

    <script src="services/beuSearchService.js"></script>
    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch((error) => {
            console.warn("Offline service worker registration failed.", error);
          });
        });
      }
    </script>
  </body>
</html>
